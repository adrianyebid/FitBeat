# ===================================================================
# Docker Compose — Componente A (User Service + PostgreSQL)
# ===================================================================


services:

  # ─────────────── Base de Datos Relacional (CA) ───────────────
  postgres_db:
    image: postgres:15-alpine
    container_name: component_a_db
    env_file:
      - .env
    environment:
      
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432" 
    volumes:
      - postgres_data:/var/lib/postgresql/data 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -h 127.0.0.1 -p 5432"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - component_a_network
    restart: always

  # ─────────────── API FastAPI (Componente A) ─────────────
  component_a:
    build: ./backend/user-service
    container_name: component_a_api
 
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend/user-service:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Conexión interna: Usa el nombre del servicio 'postgres_db' y el puerto 5432 
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres_db:5432/${POSTGRES_DB}
      
      # Inyección de variables críticas del .env [cite: 35]
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET}
      REDIRECT_URI: ${REDIRECT_URI}
      
      # Llave para mitigar CWE-312 (Cifrado de tokens en reposo) 
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    depends_on:
      postgres_db:
        condition: service_healthy
    networks:
      - component_a_network
    restart: always

  # ───────────── CouchDB (Componente B) ─────────────
  couchdb:
    image: couchdb:3
    container_name: component_b_couchdb
    environment:
      COUCHDB_USER: ${COUCHDB_USER:-admin}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD:-secret}
    ports:
      - "5984:5984"
    volumes:
      - couchdb_data:/opt/couchdb/data
    networks:
      - component_a_network
    restart: always

  # ───────────── Music Service (Componente B) ─────────────
  music_service:
    build: ./backend/music-service
    container_name: component_b_api
    ports:
      - "8081:8081"
    environment:
      PORT: "8081"
      COUCHDB_ADDR: "${COUCHDB_USER:-admin}:${COUCHDB_PASSWORD:-secret}@couchdb:5984"
    depends_on:
      - couchdb
    networks:
      - component_a_network
    restart: always

  # ───────────── Frontend (React + Vite) ─────────────
  frontend:
    build: ./frontend
    container_name: fitbeat_frontend
    ports:
      - "5173:5173"
    environment:
      VITE_AUTH_API_URL: http://localhost:8000
      VITE_MUSIC_API_URL: http://localhost:8081
      VITE_WS_API_URL: ws://localhost:8081
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - component_a
      - music_service
    networks:
      - component_a_network
    restart: always

# ─────────────── Red Interna (Bridge) ─────────────
networks:
  component_a_network:
    driver: bridge

# ─────────────── Volumen Persistente ─────────────
volumes:
  postgres_data:
  couchdb_data:
