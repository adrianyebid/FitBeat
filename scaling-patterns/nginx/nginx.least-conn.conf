events {}

http {
    # Least Connections Load Balancing
    # Routes each new request to the replica with the fewest active connections.
    # This is more equitable when request processing times vary.
    # A busy replica receives fewer new requests while it is still handling previous ones.
    # Best for: mixed workloads where some requests take longer than others
    
    upstream fitbeat_replicas {
        least_conn;  # Route to the replica with fewest active connections
        server replica_1:5000;
        server replica_2:5000;
        server replica_3:5000;
    }

    server {
        listen 80;
        server_name localhost;

        # Health check endpoint (optional, for monitoring)
        location /health {
            access_log off;
            return 200 "Least Connections Load Balancer - OK\n";
            add_header Content-Type text/plain;
        }

        # API endpoints - all proxied to the pool
        location /api/ {
            proxy_pass http://fitbeat_replicas;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Connection settings
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Default route
        location / {
            proxy_pass http://fitbeat_replicas;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
