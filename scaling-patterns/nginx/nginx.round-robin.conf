events {}

http {
    # Round Robin Load Balancing (default, no explicit directive needed)
    # Requests are distributed in strict rotation: replica_1 → replica_2 → replica_3 → replica_1 → ...
    # Best for: homogeneous replicas with similar processing times
    
    upstream fitbeat_replicas {
        # Round Robin is the default: no extra directive needed.
        # Requests cycle: replica_1 → replica_2 → replica_3 → replica_1 → ...
        server replica_1:5000;
        server replica_2:5000;
        server replica_3:5000;
    }

    server {
        listen 80;
        server_name localhost;

        # Health check endpoint (optional, for monitoring)
        location /health {
            access_log off;
            return 200 "Round Robin Load Balancer - OK\n";
            add_header Content-Type text/plain;
        }

        # API endpoints - all proxied to the pool
        location /api/ {
            proxy_pass http://fitbeat_replicas;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Connection settings
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Default route
        location / {
            proxy_pass http://fitbeat_replicas;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
