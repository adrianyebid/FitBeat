events {}

http {
    # IP Hash Load Balancing (Sticky Sessions)
    # The client IP is hashed; the same client always reaches the same replica.
    # This provides session affinity: if a client disconnects and reconnects,
    # it will be routed to the same replica (assuming that replica is still online).
    # Best for: applications that require session affinity without a shared session store
    
    upstream fitbeat_replicas {
        ip_hash;  # A given client IP always reaches the same replica
        server replica_1:5000;
        server replica_2:5000;
        server replica_3:5000;
    }

    server {
        listen 80;
        server_name localhost;

        # Health check endpoint (optional, for monitoring)
        location /health {
            access_log off;
            return 200 "IP Hash Load Balancer (Sticky Sessions) - OK\n";
            add_header Content-Type text/plain;
        }

        # API endpoints - all proxied to the pool
        location /api/ {
            proxy_pass http://fitbeat_replicas;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Connection settings
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Default route
        location / {
            proxy_pass http://fitbeat_replicas;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
