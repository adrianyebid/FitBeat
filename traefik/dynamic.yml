http:
  routers:
    auth:
      entryPoints:
        - web
        - websecure      # <-- AÑADIDO: Escucha en el puerto seguro
      rule: "PathPrefix(`/api/auth`) || PathPrefix(`/auth`) || PathPrefix(`/users`)"
      service: auth-svc
      tls: {}            # <-- AÑADIDO: Habilita la terminación TLS para esta ruta

    music:
      entryPoints:
        - web
        - websecure    
      rule: "PathPrefix(`/api/v1`)"
      service: music-svc
      tls: {}            

    achievements:
      entryPoints:
        - web
        - websecure     
      rule: "PathPrefix(`/achievements`)"
      service: achievements-svc
      tls: {}            

    notifications:
      entryPoints:
        - web
        - websecure      
      rule: "PathPrefix(`/notifications`)"
      service: notifications-svc
      tls: {}          

  services:
    auth-svc:
      loadBalancer:
        servers:
          - url: "http://component_a:8000"

    music-svc:
      loadBalancer:
        servers:
          - url: "http://music_service:8081"

    achievements-svc:
      loadBalancer:
        servers:
          - url: "http://achievements_service:8082"

    notifications-svc:
      loadBalancer:
        servers:
          - url: "http://notification_service:8083"


tls:
  certificates:
    - certFile: "/etc/traefik/certs/fitbeat-server.crt"
      keyFile: "/etc/traefik/certs/fitbeat-server.key"
  options:
    default:
      minVersion: VersionTLS12
      cipherSuites:
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA256
