http:
  routers:
    # ── API Gateway (todo el tráfico de backend va a KrakenD) ──────────────
    api-http:
      entryPoints:
        - web
      rule: >-
        PathPrefix(`/api`) ||
        PathPrefix(`/auth`) ||
        PathPrefix(`/users`) ||
        PathPrefix(`/achievements`) ||
        PathPrefix(`/notifications`)
      service: api-gateway-svc
      middlewares:
        - cors-headers
      priority: 10

    api-https:
      entryPoints:
        - websecure
      rule: >-
        PathPrefix(`/api`) ||
        PathPrefix(`/auth`) ||
        PathPrefix(`/users`) ||
        PathPrefix(`/achievements`) ||
        PathPrefix(`/notifications`)
      service: api-gateway-svc
      middlewares:
        - cors-headers
      priority: 10
      tls: {}

  middlewares:
    cors-headers:
      headers:
        accessControlAllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        accessControlAllowHeaders:
          - "*"
        accessControlAllowOriginList:
          - "http://localhost:5173"
          - "http://localhost:3000"
        accessControlAllowCredentials: true
        accessControlMaxAge: 43200

  services:
    # KrakenD es el único backend que Traefik conoce para las APIs
    api-gateway-svc:
      loadBalancer:
        servers:
          - url: "http://krakend:8085"

tls:
  certificates:
    - certFile: "/etc/traefik/certs/fitbeat-server.crt"
      keyFile:  "/etc/traefik/certs/fitbeat-server.key"
  options:
    default:
      minVersion: VersionTLS12
      cipherSuites:
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384

